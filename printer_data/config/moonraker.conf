[server]
host: 0.0.0.0
port: 7125
klippy_uds_address: /home/riccorbypro/printer_data/comms/klippy.sock
[authorization]
force_logins: False
trusted_clients:
    # 192.168.0.0/16
    # 10.0.0.0/8
    127.0.0.0/8
    kevin.local
    knomi.local
    192.168.0.50
    192.168.0.81
    # 169.254.0.0/16
    # 172.16.0.0/12
    # FC00::/7
    # FE80::/10
    # ::1/128
cors_domains:
    *.local
    *://localhost
    *://localhost:*
    *://kevin.riccorby.pro
[octoprint_compat]
[history]
[file_manager]
default_metadata_parser_timeout: 120
[timelapse]
output_path: ~/printer_data/timelapse/
frame_path: /tmp/timelapse/printer
[update_manager]
channel: dev
refresh_interval: 168
[update_manager klipper]
report_anomalies: False
[include octoapp-system.cfg]
[update_manager fluidd]
path: /home/riccorbypro/fluidd
repo: fluidd-core/fluidd
channel: stable
type: web
persistent_files:
    config.json
[update_manager fluidd-config]
managed_services: klipper
origin: https://github.com/fluidd-core/fluidd-config.git
path: /home/riccorbypro/fluidd-config
primary_branch: master
type: git_repo
# Crowsnest update_manager entry
[update_manager crowsnest]
type: git_repo
path: ~/crowsnest
origin: https://github.com/mainsail-crew/crowsnest.git
managed_services: crowsnest
install_script: tools/pkglist.sh
[update_manager led_effect]
type: git_repo
path: ~/klipper-led_effect
origin: https://github.com/julianschill/klipper-led_effect.git
is_system_service: False
[update_manager timelapse]
type: git_repo
primary_branch: main
path: ~/moonraker-timelapse
origin: https://github.com/mainsail-crew/moonraker-timelapse.git
managed_services: klipper moonraker
# HelixScreen Update Manager
# Added by HelixScreen installer - enables one-click updates from Mainsail/Fluidd
# NOTE: type: web is used instead of type: zip as a workaround for
# mainsail-crew/mainsail#2444 (zip type always shows UP-TO-DATE).
# A systemd path unit handles service restart after Moonraker extracts the update.
[update_manager helixscreen]
type: web
channel: stable
repo: prestonbrown/helixscreen
path: ~/helixscreen
## Klippain Shake&Tune automatic update management
[update_manager Klippain-ShakeTune]
type: git_repo
origin: https://github.com/Frix-x/klippain-shaketune.git
path: ~/klippain_shaketune
virtualenv: /home/riccorbypro/klippy-env
requirements: requirements.txt
system_dependencies: system-dependencies.json
primary_branch: main
managed_services: klipper
# [update_manager happy-hare]
# type: git_repo
# path: ~/happy-hare
# origin: https://github.com/moggieuk/Happy-Hare.git
# primary_branch: main
# managed_services: klipper
[mmu_server]
enable_file_preprocessor: True
enable_toolchange_next_pos: True
update_spoolman_location: True
[update_manager klipper-backup]
type: git_repo
path: ~/klipper-backup
origin: https://github.com/Staubgeborener/klipper-backup.git
managed_services: moonraker
primary_branch: main

[update_manager cartographer_plugin]
type: python
channel: stable
virtualenv: ~/klippy-env
project_name: cartographer3d-plugin
is_system_service: False
managed_services: klipper
info_tags: desc=Cartographer Plugin

[update_manager cartographer_firmware]
type: git_repo
path: ~/cartographer_firmware
is_system_service: False
origin: https://github.com/Cartographer3D/cartographer_firmware.git

[update_manager katapult]
type: git_repo
path: ~/katapult
is_system_service: False
origin: https://github.com/Arksine/katapult.git
