[mcu mmu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_57A53002A434B70739383333-if00
# # cd ~/klipper/scripts && python3 -c 'import flash_usb as u; u.enter_bootloader("/dev/serial/by-id/usb-Klipper_stm32f103xe_57A53002A434B70739383333-if00")'
restart_method: command

# [output_pin _cfs_red_0]
# pin: mmu:PC6
# [output_pin _cfs_white_0]
# pin: mmu:PB7
# [output_pin _cfs_red_1]
# pin: mmu:PC7
# [output_pin _cfs_white_1]
# pin: mmu:PB4
# [output_pin _cfs_red_2]
# pin: mmu:PC8
# [output_pin _cfs_white_2]
# pin: mmu:PB5
# [output_pin _cfs_red_3]
# pin: mmu:PC9
# [output_pin _cfs_white_3]
# pin: mmu:PB6
[led _cfs_0]
red_pin: mmu:PC6
white_pin: mmu:PB7
[led _cfs_1]
red_pin: mmu:PC7
white_pin: mmu:PB4
[led _cfs_2]
red_pin: mmu:PC8
white_pin: mmu:PB5
[led _cfs_3]
red_pin: mmu:PC9
white_pin: mmu:PB6
[filament_switch_sensor _cfs_presence_0]
pause_on_runout: false
switch_pin: !mmu:PD7
event_delay: 0
insert_gcode:
  SET_LED LED=_cfs_0 RED=0 WHITE=1
  SET_FAN_SPEED FAN=_cfs_filament_0_feed SPEED=1
runout_gcode:
  SET_LED LED=_cfs_0 RED=1 WHITE=0

[filament_switch_sensor _cfs_presence_1]
pause_on_runout: false
switch_pin: !mmu:PD6
event_delay: 0
insert_gcode:
  SET_LED LED=_cfs_1 RED=0 WHITE=1
  SET_FAN_SPEED FAN=_cfs_filament_1_feed SPEED=1
runout_gcode:
  SET_LED LED=_cfs_1 RED=1 WHITE=0

