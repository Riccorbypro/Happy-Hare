  SET_LED LED=_cfs_3 RED=0 WHITE=1
  SET_FAN_SPEED FAN=_cfs_filament_3_retract SPEED=0

[filament_switch_sensor _cfs_buffer_0]
pause_on_runout: false
switch_pin: !mmu:PD8

[filament_switch_sensor _cfs_buffer_1]
pause_on_runout: false
switch_pin: !mmu:PD9

[output_pin cfs_direction]
pin: mmu:PE3
value: 1.0

[fan_generic cfs_drive_motor]
pin: !mmu:PE13
enable_pin: !mmu:PE4
# tachometer_pin: ^mmu:PB14
# tachometer_pin: ^!mmu:PE11
tachometer_pin: ^mmu:PB3
tachometer_ppr: 200
# tachometer_poll_interval: 0.0005
# off_below: 0.3

[angle cfs_drive_speed]
sensor_type: mt6826s
cs_pin: mmu:PB12
#   The SPI enable pin for the sensor. This parameter must be provided.
#spi_speed:
#spi_bus:
spi_software_sclk_pin: mmu:PB13
spi_software_mosi_pin: mmu:PB15
spi_software_miso_pin: mmu:PB14

[fan_generic _cfs_filament_0_feed]
pin: mmu:PD2

[fan_generic _cfs_filament_0_retract]
pin: mmu:PD3

[fan_generic _cfs_filament_1_feed]
pin: mmu:PD0

[fan_generic _cfs_filament_1_retract]
pin: mmu:PD1

[fan_generic _cfs_filament_2_feed]
pin: mmu:PD14

[fan_generic _cfs_filament_2_retract]
pin: mmu:PD15

[fan_generic _cfs_filament_3_feed]
pin: mmu:PD12

[fan_generic _cfs_filament_3_retract]
pin: mmu:PD13