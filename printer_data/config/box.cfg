pause_on_runout: false
switch_pin: !mmu:PE8
event_delay: 0
insert_gcode:
  SET_LED LED=_cfs_2 RED=0 WHITE=1
  SET_FAN_SPEED FAN=_cfs_filament_2_feed SPEED=0
  SET_FAN_SPEED FAN=_cfs_filament_2_retract SPEED=1
  G4 P2000
  SET_FAN_SPEED FAN=_cfs_filament_2_retract SPEED=0
