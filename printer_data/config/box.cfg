  SET_LED LED=_cfs_3 RED=0 WHITE=1
  SET_FAN_SPEED FAN=_cfs_filament_3_feed SPEED=0
  SET_FAN_SPEED FAN=_cfs_filament_3_retract SPEED=1
  G4 P2000
