insert_gcode:
  SET_LED LED=_cfs_3 RED=0 WHITE=1
  SET_FAN_SPEED FAN=_cfs_filament_3_feed SPEED=1
runout_gcode:
  SET_LED LED=_cfs_3 RED=1 WHITE=0

[filament_switch_sensor _cfs_gate_0]
pause_on_runout: false
switch_pin: !mmu:PE10
event_delay: 0
insert_gcode:
  # SET_LED LED=_cfs_0 RED=0 WHITE=1
  # SET_FAN_SPEED FAN=_cfs_filament_0_feed SPEED=0
  # SET_FAN_SPEED FAN=_cfs_filament_0_retract SPEED=1
  # G4 P2000
  # SET_FAN_SPEED FAN=_cfs_filament_0_retract SPEED=0
runout_gcode:
  SET_LED LED=_cfs_0 RED=0 WHITE=1
  SET_FAN_SPEED FAN=_cfs_filament_0_retract SPEED=0

[filament_switch_sensor _cfs_gate_1]
pause_on_runout: false
switch_pin: !mmu:PE9
event_delay: 0
insert_gcode:
  SET_LED LED=_cfs_1 RED=0 WHITE=1
  SET_FAN_SPEED FAN=_cfs_filament_1_feed SPEED=0
  SET_FAN_SPEED FAN=_cfs_filament_1_retract SPEED=1
  G4 P2000
  SET_FAN_SPEED FAN=_cfs_filament_1_retract SPEED=0
runout_gcode:
  SET_LED LED=_cfs_1 RED=0 WHITE=1
  SET_FAN_SPEED FAN=_cfs_filament_1_retract SPEED=0

