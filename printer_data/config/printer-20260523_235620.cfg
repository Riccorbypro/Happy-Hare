# points:
#  40.0, 0.3
#  45.0, 0.4
#  50.0, 0.6
#  55.0, 0.85
#  60.0, 1.0
# cooling_hysteresis: 2.0
min_temp: -10
max_temp: 90
target_temp: 50

[fan_generic exhaust_fan]
pin: PA1
cycle_time: 0.0100
kick_start_time: 0.5
# min_power: 0.3
max_power: 1.0

[fan_generic ouglesauce]
pin: PB3
cycle_time: 0.0100
kick_start_time: 1.0
# min_power: 0.5
max_power: 1.0

[heater_generic chamber]
heater_pin: PC8
max_power: 1.0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
control: watermark
max_delta: 1
min_temp: 0
max_temp: 65

[verify_heater chamber]
max_error: 900
check_gain_time: 300
hysteresis: 50
heating_gain: 1

