[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mcu
# Remove either the serial or canbus_uuid line dependant on your setup.
serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_3A0047001850303655333520-if00
# cd ~/klipper/scripts && python3 -c 'import flash_usb as u; u.enter_bootloader("/dev/serial/by-id/usb-Cartographer_stm32g431xx_3A0047001850303655333520-if00")'
restart_method: command # Not needed for probes using CAN. 

[cartographer]
mcu: cartographer
x_offset: -1 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: -27 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: no # For extra output

[cartographer touch]
#   The number of samples to use when doing a touch.
#   Constraints: minimum: 3
samples: 3
#   The maximum number of samples to do before giving up.
max_samples: 15
#   The number of noisy samples tolerated within the sliding window. The window size is calculated as samples + max_noisy_samples. A smaller value prevents cherry-picking good samples from a noisy sequence.
#   Constraints: minimum: 0
#max_noisy_samples: 2
#   The maximum allowed nozzle temperature to use when touching the plate. This is set to 150C to avoid damaging your plate. Change this AT YOUR OWN RISK.
UNSAFE_max_touch_temperature: 155
#   Radius around the Z home position to do touch.
#   Constraints: minimum: 0.0
EXPERIMENTAL_home_random_radius: 10.0
#   Retract distance (in mm) between touch samples.
#   Constraints: minimum: 1.0
#retract_distance: 2.0
#   Acceptable range (in mm) between touch samples.
#   Constraints: minimum: 0.001, maximum: 0.015
# sample_range: 0.01

[axis_twist_compensation]
calibrate_start_x: 11
calibrate_end_x: 290
calibrate_y: 150
calibrate_start_y: 37
calibrate_end_y: 260

[bed_mesh]
zero_reference_position: 150,150 # The centre of your bed. 
speed: 400
horizontal_move_z: 3
mesh_min: 15, 10 # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 285, 260 # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 2, 2
algorithm: bicubic
bicubic_tension: 0.2
move_check_distance: 5
split_delta_z: .025
fade_start: 1
fade_end: 10
fade_target: 0
scan_overshoot: 8  #uncomment this section if you still have room left over on the X axis for some scan overshoot to product smoother movements and more accurate scanning. Uncommenting this should be fine if you are using a standard voron mount.

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

# [adxl345]
# # Select 1 of the cs_pin below depending on the probe you have. 
# # Having the wrong one selected will cause an Endless Bootloop
# # Cartographer V4 has int2 connected to the probes PA1 pin
# cs_pin: cartographer:PA3 # For Cartographer V3
# cs_pin: cartographer:PA0 # For Cartographer V4
# spi_bus: spi1

# [resonance_tester]
# accel_chip: adxl345
# probe_points:
#     <blank>, <blank>, 20 # Fill out the blank with x and y coordinates where you want to run the resonance test.

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
gcode:
  SET_PRINTER_STATE STATE=meshing
  _BED_MESH_CALIBRATE {rawparams}
  M400
  SET_PRINTER_STATE STATE=idle

[gcode_macro CARTOGRAPHER_TOUCH_HOME]
rename_existing: _CARTOGRAPHER_TOUCH_HOME
gcode:
  SET_PRINTER_STATE STATE=calibrating
  G90
  G1 Z10 F1800
  G1 X150 Y150 F6000
  _CARTOGRAPHER_TOUCH_HOME
  SET_PRINTER_STATE STATE=idle