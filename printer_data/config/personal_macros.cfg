[gcode_macro LIGHTS_ON]
gcode:
  SET_PIN PIN=LED VALUE=1.0

[gcode_macro LIGHTS_OFF]
gcode:
  SET_PIN PIN=LED VALUE=0.0

[gcode_macro LIGHTS_DIM]
gcode:
  SET_PIN PIN=LED VALUE=0.01

[gcode_macro M106]
rename_existing: M106.1
gcode:
  {% set fan = params.P|default(0)|int %}
  {% set speed = params.S|default(0)|float %}
  {% if fan == 0 %}
    M106.1 S{speed}
  {% endif %}
  {% if fan == 1 %}
    SET_FAN_SPEED FAN=exhaust_fan SPEED={speed/255.0}
  {% endif %}
  {% if fan == 3 %}
    SET_FAN_SPEED FAN=ouglesauce SPEED={speed/255.0}
  {% endif %}

[gcode_macro PID_BED]
description: Start Bed PID
gcode:
  G90
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}
  SET_PRINTER_STATE STATE=calibrating
  G1 Z10 F600
  M106 S204
  PID_CALIBRATE HEATER=heater_bed TARGET={params.BED_TEMP|default(70)}
  M107
  {% set y_park = printer.toolhead.axis_maximum.y/2 %}
  {% set x_park = printer.toolhead.axis_maximum.x|float - 10.0 %}
  G1 X{x_park} Y{y_park} F20000
  SET_PRINTER_STATE STATE=idle

[gcode_macro PID_HOTEND]
description: Start Hotend PID
gcode:
  G90
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}
  SET_PRINTER_STATE STATE=calibrating
  G1 Z10 F600
  M106
  PID_CALIBRATE HEATER=extruder TARGET={params.HOTEND_TEMP|default(250)}
  M107
  {% set y_park = printer.toolhead.axis_maximum.y/2 %}
  {% set x_park = printer.toolhead.axis_maximum.x|float - 10.0 %}
  G1 X{x_park} Y{y_park} F20000
  SET_PRINTER_STATE STATE=idle

[gcode_macro SHAPER_CALIBRATE]
rename_existing: _SHAPER_CALIBRATE
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}
  SET_PRINTER_STATE STATE=calibrating
  _SHAPER_CALIBRATE {rawparams}
  SET_PRINTER_STATE STATE=idle

[gcode_macro PID_SHAPER_RECALIBRATE]
gcode:
  G28
  PID_HOTEND
  PID_BED
  SHAPER_CALIBRATE
  SAVE_CONFIG

[gcode_macro WARMUP]
description: Stress Test
variable_maxd: 14142.14 ; = SQRT(2*maxy)
gcode:
  {% set min_loops = 2 %}
  {% set max_loops = params.LOOPS|default(3)|int %}
  {% if 'LOOPS' in params|upper %}
    {% if max_loops < min_loops %}
      {% set max_loops = min_loops %}
    {% endif %}
  {% endif %}
  {% set loop_cnt = max_loops %}
  {% set maxx = params.X_ACCEL_MAX|default(10000)|int %}
  {% set maxy = params.Y_ACCEL_MAX|default(10000)|int %}
  {% set max_x = (printer.toolhead.axis_maximum.x|int-15) %}
  {% set max_y = (printer.toolhead.axis_maximum.y|int-25) %}
  {% set loop_step_y = max_y//(loop_cnt-1) %}
  {% set loop_step_x = max_x//(loop_cnt-1) %}
  {% set y_park = printer.toolhead.axis_maximum.y/2 %}
  {% set x_park = printer.toolhead.axis_maximum.x|float - 10.0 %}
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28
  {% endif %}
  G1 Z50 F1200
  SET_VELOCITY_LIMIT ACCEL={maxx} ACCEL_TO_DECEL={maxx/2}
  {% for number in range(10,max_y+11,loop_step_y) %}
    {% if number >= max_y %}
    {% set number = max_y %}
    {% endif %}
    G1 F{maxy} X10 Y{number}
    G1 F{maxx} X{max_x} Y{number}
  {% endfor %}
  SET_VELOCITY_LIMIT ACCEL={maxy} ACCEL_TO_DECEL={maxy/2}
  {% for number in range(10,max_x+11,loop_step_y) %}
    {% if number >= max_x %}
    {% set number = max_x %}
    {% endif %}
    G1 F{maxy} X{number} Y{max_y}
    G1 F{maxy} X{number} Y10
  {% endfor %}
  SET_VELOCITY_LIMIT ACCEL={maxd} ACCEL_TO_DECEL={maxd/2}
  {% for times in range(loop_cnt) %}
    G1 F{maxx} X10 Y10
    G1 F{maxd} X{max_x} Y{max_y}
    G1 F{maxx} X10 Y{max_y}
    G1 F{maxd} X{max_x} Y10
    G1 F{maxy} X{max_x} Y{max_y}
    G1 F{maxd} X10 Y10
    G1 F{maxy} X10 Y{max_y}
    G1 F{maxd} X{max_x} Y10
  {% endfor %}
  SET_VELOCITY_LIMIT ACCEL={maxx} ACCEL_TO_DECEL={maxx/2}
  {% for times in range(loop_cnt) %}
    G1 F{maxy} X10 Y10
    G1 F{maxy} X10 Y{max_y}
    G1 F{maxx} X{max_x} Y{max_y}
    G1 F{maxy} X{max_x} Y10
    G1 F{maxx} X10 Y10
    G1 F{maxx} X{max_x} Y10
    G1 F{maxy} X{max_x} Y{max_y}
    G1 F{maxx} X10 Y{max_y}
  {% endfor %}
  G1 X{x_park} Y{y_park} F20000


[gcode_macro M141]
gcode:
  {% if 'S' in params|upper %}
    {% if printer["temperature_fan chamber_fan"].speed > 0.0 %}
      M106 P1 S255
    {% else %}
      M106 P1 S0
    {% endif %}
    {% if params.S|int > 0 %}
      SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber_fan TARGET={params.S|default(35)}
    {% else %}
      SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber_fan TARGET=35
      {% if params.S|int == 0 %}
        M106 P1 S0
      {% endif %}
    {% endif %}
  {% endif %}
  {% if printer["heater_generic chamber"] is defined %}
    {% if params.S|int > 35 %}
      {% set requested_temp = params.S|int|default(35) %}
      {% set actual_temp = requested_temp - 5 %}
      SET_HEATER_TEMPERATURE HEATER=chamber TARGET={ [actual_temp, 35]|max }
    {% else %}
      SET_HEATER_TEMPERATURE HEATER=chamber TARGET=0
    {% endif %}
  {% endif %}


[gcode_macro M191]
description: Wait for Chamber Temperature to heat up
gcode:
  {% set s = params.S|float %}
  {% set chamber_temp = printer["heater_generic chamber"].temperature|float %}
  M141 S{s}
  {% if printer.toolhead.homed_axes != "xyz" %}
    RESPOND TYPE=command MSG="Homing axes before heating chamber..."
    G28
  {% endif %}
  {% if s > chamber_temp and s <= 65 %}
    M104 S40
    M140 S110
    G0 X290 Y10 Z100
    M106 P0 S210
    M106 P1 S0
    M106 P3 S210 ;We probably want air filtration since we're heating the chamber - usually only engineering mats need that
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    RESPOND TYPE=command MSG="Waiting for the chamber to heat to at least {s-8}°C..."
    TEMPERATURE_WAIT SENSOR="chamber" MINIMUM={s-8}
    RESPOND TYPE=command MSG="Chamber temperature reached: {s-8}°C"
    M107 P0 S0
    G28
  {% endif %}
  M140 S{s}

[gcode_shell_command wake_pc]
command: wakeonlan -i 192.168.1.255 a0:ad:9f:01:fd:c2

[gcode_macro WAKE_PC]
gcode:
  RUN_SHELL_COMMAND CMD=wake_pc

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True