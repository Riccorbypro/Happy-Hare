[gcode_macro _CARTOGRAPHER_VARIABLES]
# you can set this to False to not do touch
variable_touch_mode: True
# whether we need to verify K1 specific cartographer firmware is being used
# this will be set to False by the RPI installer
variable_verify_firmware: False
gcode:

[mcu cartographer]
is_non_critical: true
no_reconnect: true # reconnecting cartographer causes klipper to crash
serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_3A0047001850303655333520-if00
restart_method: command

[cartographer]
mcu: cartographer
x_offset: -1 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: -27 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: no # For extra output

[cartographer scan]
mesh_runs: 2

# if you want to only do scan, disable this section
[cartographer touch]
max_samples: 20

[temperature_sensor cartographer_mcu]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 0
max_temp: 105


[bed_mesh]
zero_reference_position: 150,150 # The centre of your bed. 
speed: 200
horizontal_move_z: 3
mesh_min: 15, 10 # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 285, 260 # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 2, 2
algorithm: bicubic
bicubic_tension: 0.2
move_check_distance: 5
split_delta_z: .025
fade_start: 1
fade_end: 10
fade_target: 0
scan_overshoot: 8 

[screws_tilt_adjust]
screw1: 19,23
screw1_name: front left
screw2: 278,23
screw2_name: front right
screw3: 248,272
screw3_name: rear right
screw4: 50,272
screw4_name: rear left
horizontal_move_z: 10
speed: 200
screw_thread: CW-M4

# this excessive config (the 999) is intentional, we pass `USE_TOUCH_BOUNDARIES=1` to
# do axis twist compensation

[axis_twist_compensation]
calibrate_start_x: 11
calibrate_end_x: 290
calibrate_y: 150
calibrate_start_y: 37
calibrate_end_y: 260